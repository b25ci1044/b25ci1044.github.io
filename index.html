<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>For My Cutie ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
overflow:hidden;

background:url("https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=2000")
center/cover no-repeat;
}

.overlay{
position:absolute;
inset:0;
background:rgba(255,192,203,.25);
backdrop-filter:blur(2px);
}

.card{
position:relative;
z-index:2;
background:rgba(255,255,255,.9);
padding:30px;
border-radius:25px;
text-align:center;
width:450px;
box-shadow:0 0 30px rgba(0,0,0,.2);
}

.photo{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
border:6px solid hotpink;
margin-bottom:15px;
}

h1{
color:#ff3e6c;
}

button{
padding:12px 28px;
font-size:18px;
border:none;
border-radius:25px;
cursor:pointer;
transition:.2s;
}

#yes{
background:#ff3e6c;
color:white;
margin-right:10px;
}

#no{
background:#777;
color:white;
position:absolute;
}

.hearts{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
pointer-events:none;
}

.heart{
position:absolute;
font-size:25px;
animation:float 8s linear forwards;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-120px);
opacity:0;
}
}

.final{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
color:white;
font-size:30px;
text-align:center;
background:linear-gradient(135deg,#ff5f8f,#ff90b3);
}

</style>
</head>
<body>

<div class="overlay"></div>
<div class="hearts" id="hearts"></div>

<div class="card" id="mainCard">

<img src="her-photo.jpg" class="photo">

<h1>Hey Hetuuuudiii❤️</h1>

<h2>Will you send me your cutest selfie right now? 📸💕</h2>

<div style="margin-top:25px;">
<button id="yes">YES ❤️</button>
<button id="no">NO 😏</button>
</div>

</div>

<script>

let count=0;

const yes=document.getElementById("yes");
const no=document.getElementById("no");

const msgs=[
"Are you sure? 🥺",
"Really sure? 😭",
"I'm becoming sad 💔",
"System Error 🚨",
"No option disabled ❌"
];

no.addEventListener("mouseover",()=>{

if(count<4){

alert(msgs[count]);

let x=Math.random()*(window.innerWidth-150);
let y=Math.random()*(window.innerHeight-100);

no.style.left=x+"px";
no.style.top=y+"px";

yes.style.transform=`scale(${1+(count*0.2)})`;

count++;
}
else{
no.remove();
}
});

yes.addEventListener("click",()=>{

document.body.innerHTML=`
<div class="final">

<h1>YAYYYYYY ❤️🥰🎉</h1>

<h2>
Now send me the cutest picture in your gallery 📸💕
</h2>

<h3>
Failure to comply will result in unlimited hugs,
kisses and compliments 😈❤️
</h3>

<div style="font-size:100px;">
💖👩‍❤️‍👨💖
</div>

</div>
`;

});

function createHeart(){

const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";
h.style.fontSize=(20+Math.random()*30)+"px";

document.getElementById("hearts").appendChild(h);

setTimeout(()=>h.remove(),8000);
}

setInterval(createHeart,250);

</script>

</body>
</html>
